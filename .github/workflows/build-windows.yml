name: Build llama.cpp LocateAnything Windows CUDA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout yuuko-eth llama.cpp mtmd-grounders
        uses: actions/checkout@v4
        with:
          repository: yuuko-eth/llama.cpp
          ref: mtmd-grounders
          submodules: recursive

      - name: Check branch and commit
        shell: powershell
        run: |
          git branch
          git rev-parse HEAD
          git log -1 --oneline
          git grep -n "locateanything" -- . || exit 1

      - name: Setup CUDA
        uses: Jimver/cuda-toolkit@v0.2.24
        with:
          cuda: '12.4.1'

      - name: Configure CMake CUDA
        shell: powershell
        run: |
          cmake -B build `
            -DGGML_CUDA=ON `
            -DCMAKE_BUILD_TYPE=Release

      - name: Build Release
        shell: powershell
        run: |
          cmake --build build --config Release -j 4

      - name: Package
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force llama-locate-win-cuda
          Copy-Item build\bin\Release\*.exe llama-locate-win-cuda\
          Copy-Item build\bin\Release\*.dll llama-locate-win-cuda\
          Copy-Item "C:\Program Files\Git\mingw64\bin\libssl-3-x64.dll" llama-locate-win-cuda\ -ErrorAction SilentlyContinue
          Copy-Item "C:\Program Files\Git\mingw64\bin\libcrypto-3-x64.dll" llama-locate-win-cuda\ -ErrorAction SilentlyContinue
          Compress-Archive -Path llama-locate-win-cuda\* -DestinationPath llama-locate-win-cuda.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: llama-locate-win-cuda
          path: llama-locate-win-cuda.zip